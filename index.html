<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIf - Premium Clothing</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --accent-green: #1f5c3a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            /* Легкий природный градиент на фоне */
            background: radial-gradient(circle at 50% 0%, #1f5c3a22 0%, #121212 60%);
            background-attachment: fixed;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 4px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        /* Glassmorphism Product Card */
        .product-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-image {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 12px;
        }

        .product-title { font-size: 14px; font-weight: 400; margin-bottom: 5px; }
        .product-price { font-size: 16px; font-weight: 600; color: var(--accent-green); }

        /* Checkout Overlay */
        .checkout-overlay {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 200;
            transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .checkout-overlay.active { top: 0; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus { border-color: var(--accent-green); }

        .btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: auto;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        
        .close-btn {
            background: none; border: none; color: white; font-size: 24px;
            text-align: right; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>VIf</header>

    <div class="catalog" id="catalog">
        </div>

    <div class="checkout-overlay" id="checkout">
        <button class="close-btn" onclick="closeCheckout()">✕</button>
        <h2 style="margin-bottom: 20px;">Оформление заказа</h2>
        
        <div class="form-group">
            <label>Размер</label>
            <select id="size">
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
        </div>

        <div class="form-group">
            <label>Имя</label>
            <input type="text" id="name" placeholder="Иван Иванов" required>
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="phone" placeholder="+7 999 000 00 00" required>
        </div>
        <div class="form-group">
            <label>Адрес доставки (СДЭК/Почта)</label>
            <input type="text" id="address" placeholder="г. Москва, ул. Ленина..." required>
        </div>

        <button class="btn" onclick="submitOrder()">Перейти к оплате ➡️</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        // Моковые данные (в реальном проекте делаем fetch к Backend API)
        const products = [
            { id: 1, name: "Худи VIf Forest", price: 8500, image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=400" },
            { id: 2, name: "Футболка Stone", price: 3200, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=400" },
            { id: 3, name: "Лонгслив River", price: 4500, image: "https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&q=80&w=400" },
            { id: 4, name: "Брюки Cargo", price: 7900, image: "https://images.unsplash.com/photo-1624378439575-d8705ad7ae80?auto=format&fit=crop&q=80&w=400" }
        ];

        let selectedProduct = null;

        function renderCatalog() {
            const catalog = document.getElementById('catalog');
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openCheckout(p);
                card.innerHTML = `
                    <img src="${p.image}" class="product-image" alt="${p.name}">
                    <div class="product-title">${p.name}</div>
                    <div class="product-price">${p.price} ₽</div>
                `;
                catalog.appendChild(card);
            });
        }

        function openCheckout(product) {
            selectedProduct = product;
            document.getElementById('checkout').classList.add('active');
            tg.MainButton.setText(`ОПЛАТИТЬ ${product.price} ₽`);
            tg.MainButton.show();
        }

        function closeCheckout() {
            document.getElementById('checkout').classList.remove('active');
            tg.MainButton.hide();
        }

        // Связываем главную кнопку ТГ с нашей функцией (опционально, можно оставить только кнопку в HTML)
        tg.MainButton.onClick(() => submitOrder());

        function submitOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const size = document.getElementById('size').value;

            if(!name || !phone || !address) {
                tg.showAlert("Пожалуйста, заполните все поля");
                return;
            }

            const orderData = {
                product_id: selectedProduct.id,
                name: name,
                phone: phone,
                address: address,
                size: size,
                quantity: 1,
                price: selectedProduct.price
            };

            // Отправляем данные обратно в бота
            tg.sendData(JSON.stringify(orderData));
            tg.close(); // Закрываем WebApp после оформления
        }

        renderCatalog();
    </script>
</body>
</html>
